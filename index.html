<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Detection System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>SQL Injection Detection & Data Leak Prevention</h1>

        <div class="card">
            <h2>User Login</h2>

            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">

            <button onclick="secureLogin()">Secure Login</button>

            <div id="result"></div>
        </div>

        <div class="card">
            <h2>Detected SQL Injection Logs</h2>
            <ul id="logList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
